# Streamlit configuration (theme + production behind IIS reverse proxy)

[server]
headless = true
address = "127.0.0.1"
port = 8501
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false

[browser]
gatherUsageStats = false
serverAddress = "127.0.0.1"

[theme]
# Primary color (buttons, links, accents)
primaryColor = "#0D47A1"  # Darker professional blue
backgroundColor = "#F5F5F5"  # Darker gray background
secondaryBackgroundColor = "#E0E0E0"  # Darker gray for sidebar/cards
textColor = "#1A1A1A"  # Darker text
font = "sans serif"

# Alternative theme option (uncomment to use):
# primaryColor = "#0066CC"  # Deeper blue
# backgroundColor = "#FAFAFA"  # Off-white
# secondaryBackgroundColor = "#F0F0F0"
# textColor = "#1A1A1A"
# font = "sans serif"

